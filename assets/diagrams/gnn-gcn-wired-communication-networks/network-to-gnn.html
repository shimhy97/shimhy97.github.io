<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>통신망 topology가 GNN 입력이 되는 흐름</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --paper: #fafaf7;
        --ink: #3d4144;
        --muted: #5b6472;
        --soft: #7a8288;
        --rule: rgba(61, 65, 68, 0.12);
        --accent: #1f6feb;
        --accent-tint: rgba(31, 111, 235, 0.08);
        --link: #3b9cba;
      }

      html,
      body {
        margin: 0;
        background: transparent;
      }

      body {
        overflow-x: auto;
        overflow-y: hidden;
        font-family: Geist, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
      }

      .sheet {
        width: 100%;
        min-width: 760px;
        background: var(--paper);
      }

      .canvas {
        position: relative;
        width: 100%;
        aspect-ratio: 1120 / 640;
      }

      svg {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      .title {
        font-family: "Instrument Serif", Georgia, serif;
        font-size: 36px;
        font-weight: 400;
        fill: var(--ink);
      }

      .subtitle,
      .note {
        font-size: 16px;
        fill: var(--muted);
      }

      .eyebrow,
      .arrow-label,
      .legend {
        font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 600;
        fill: var(--soft);
      }

      .node-title {
        font-size: 20px;
        font-weight: 600;
        fill: var(--ink);
      }

      .node-sub {
        font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 14px;
        fill: var(--muted);
      }

      .arrow-label {
        font-size: 11px;
        fill: var(--muted);
      }

      .legend {
        font-size: 13px;
        fill: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="sheet" aria-label="통신망 관찰이 그래프 정의와 GNN 모델을 거쳐 운영 판단으로 이어지는 흐름">
      <div class="canvas">
        <svg viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
          <title id="title">통신망 topology가 GNN 입력이 되는 흐름</title>
          <desc id="desc">라우터, 링크, 트래픽 관찰을 노드, 엣지, 피처 그래프로 바꾸고 GNN 모델을 거쳐 운영 지표와 운영 판단으로 연결하는 다이어그램</desc>
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
              <polygon points="0 0, 10 4, 0 8" fill="#5b6472"/>
            </marker>
            <marker id="arrow-accent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
              <polygon points="0 0, 10 4, 0 8" fill="#1f6feb"/>
            </marker>
            <marker id="arrow-link" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
              <polygon points="0 0, 10 4, 0 8" fill="#3b9cba"/>
            </marker>
          </defs>

          <rect width="1120" height="640" fill="#fafaf7"/>

          <text x="64" y="66" class="title">통신망 topology가 GNN 입력이 되는 흐름</text>
          <text x="64" y="100" class="subtitle">표나 시계열로 펴기 전에, 구조를 가진 그래프로 먼저 번역합니다.</text>

          <path d="M344 246 H420" stroke="#5b6472" stroke-width="1.4" marker-end="url(#arrow)"/>
          <path d="M700 246 H776" stroke="#1f6feb" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
          <path d="M560 334 V396" stroke="#5b6472" stroke-width="1.4" marker-end="url(#arrow)"/>
          <path d="M700 492 H776" stroke="#3b9cba" stroke-width="1.4" marker-end="url(#arrow-link)"/>

          <rect x="358" y="226" width="44" height="22" fill="#fafaf7"/>
          <text x="366" y="242" class="arrow-label">MAP</text>
          <rect x="714" y="226" width="42" height="22" fill="#fafaf7"/>
          <text x="722" y="242" class="arrow-label">FIT</text>
          <rect x="577" y="356" width="68" height="22" fill="#fafaf7"/>
          <text x="584" y="372" class="arrow-label">PREDICT</text>
          <rect x="714" y="472" width="40" height="22" fill="#fafaf7"/>
          <text x="722" y="488" class="arrow-label">ACT</text>

          <rect x="64" y="154" width="280" height="184" rx="8" fill="#ffffff"/>
          <rect x="64" y="154" width="280" height="184" rx="8" fill="none" stroke="#3d4144" stroke-width="1.2"/>
          <text x="92" y="198" class="eyebrow">OBSERVE</text>
          <text x="92" y="234" class="node-title">통신망 관찰</text>
          <text x="92" y="266" class="node-sub">router</text>
          <text x="92" y="290" class="node-sub">link</text>
          <text x="92" y="314" class="node-sub">traffic</text>

          <rect x="420" y="154" width="280" height="184" rx="8" fill="#fafaf7"/>
          <rect x="420" y="154" width="280" height="184" rx="8" fill="rgba(31,111,235,0.08)" stroke="#1f6feb" stroke-width="1.4"/>
          <text x="448" y="198" class="eyebrow">GRAPH</text>
          <text x="448" y="234" class="node-title">그래프 정의</text>
          <text x="448" y="266" class="node-sub">node = router / flow</text>
          <text x="448" y="290" class="node-sub">edge = link / path</text>
          <text x="448" y="314" class="node-sub">feature = traffic</text>

          <rect x="776" y="154" width="280" height="184" rx="8" fill="#ffffff"/>
          <rect x="776" y="154" width="280" height="184" rx="8" fill="none" stroke="#3d4144" stroke-width="1.2"/>
          <text x="804" y="198" class="eyebrow">MODEL</text>
          <text x="804" y="234" class="node-title">GNN 계열</text>
          <text x="804" y="266" class="node-sub">GCN</text>
          <text x="804" y="290" class="node-sub">GAT / MPNN</text>
          <text x="804" y="314" class="node-sub">GraphSAGE</text>

          <rect x="240" y="400" width="320" height="184" rx="8" fill="#ffffff"/>
          <rect x="240" y="400" width="320" height="184" rx="8" fill="none" stroke="#3d4144" stroke-width="1.2"/>
          <text x="268" y="444" class="eyebrow">METRIC</text>
          <text x="268" y="480" class="node-title">운영 지표 예측</text>
          <text x="268" y="512" class="node-sub">delay / loss</text>
          <text x="268" y="536" class="node-sub">traffic matrix</text>
          <text x="268" y="560" class="node-sub">flow completion time</text>

          <rect x="776" y="400" width="280" height="184" rx="8" fill="#ffffff"/>
          <rect x="776" y="400" width="280" height="184" rx="8" fill="none" stroke="#5b6472" stroke-width="1.2"/>
          <text x="804" y="444" class="eyebrow">DECIDE</text>
          <text x="804" y="480" class="node-title">운영 판단</text>
          <text x="804" y="512" class="node-sub">routing</text>
          <text x="804" y="536" class="node-sub">configuration</text>
          <text x="804" y="560" class="node-sub">security response</text>

          <path d="M64 604 H1056" stroke="rgba(61,65,68,0.12)" stroke-width="1"/>
          <text x="64" y="626" class="note">강조점: 모델 이름보다 먼저 graph definition이 선명해야 합니다.</text>
        </svg>
      </div>
    </main>
  </body>
</html>
